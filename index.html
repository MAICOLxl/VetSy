<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VetSy - CRUD Clientes</title>
</head>
<body>

  <h1>Clientes</h1>

  <!-- BOTÓN VER -->
  <button onclick="obtenerClientes()">Ver clientes</button>

  <!-- CREAR -->
  <h2>Crear cliente</h2>
  <input id="nombre" placeholder="Nombre"><br>
  <input id="telefono" placeholder="Teléfono"><br>
  <input id="email" placeholder="Email"><br>
  <input id="direccion" placeholder="Dirección"><br>
  <button onclick="crearCliente()">Crear</button>

  <!-- ACTUALIZAR -->
  <h2>Actualizar cliente</h2>
  <input id="idActualizar" placeholder="ID"><br>
  <input id="nombreUpd" placeholder="Nuevo nombre"><br>
  <input id="telefonoUpd" placeholder="Nuevo teléfono"><br>
  <input id="emailUpd" placeholder="Nuevo email"><br>
  <input id="direccionUpd" placeholder="Nueva dirección"><br>
  <button onclick="actualizarCliente()">Actualizar</button>

  <!-- ELIMINAR -->
  <h2>Eliminar cliente</h2>
  <input id="idEliminar" placeholder="ID"><br>
  <button onclick="eliminarCliente()">Eliminar</button>

  <!-- RESULTADOS -->
  <h2>Resultados</h2>
  <pre id="resultado"></pre>

  <script>
    const BASE_URL = "https://vetsy-production.up.railway.app";

    // 🔹 GET
    async function obtenerClientes() {
      const res = await fetch(`${BASE_URL}/clientes`);
      const data = await res.json();
      document.getElementById("resultado").textContent = JSON.stringify(data, null, 2);
    }

    // 🔹 POST
    async function crearCliente() {
      const cliente = {
        nombre: document.getElementById("nombre").value,
        telefono: document.getElementById("telefono").value,
        email: document.getElementById("email").value,
        direccion: document.getElementById("direccion").value
      };

      await fetch(`${BASE_URL}/clientes`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(cliente)
      });

      alert("Cliente creado ✅");
      obtenerClientes();
    }

    // 🔹 PUT
    async function actualizarCliente() {
      const id = document.getElementById("idActualizar").value;

      const cliente = {
        nombre: document.getElementById("nombreUpd").value,
        telefono: document.getElementById("telefonoUpd").value,
        email: document.getElementById("emailUpd").value,
        direccion: document.getElementById("direccionUpd").value
      };

      await fetch(`${BASE_URL}/clientes/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(cliente)
      });

      alert("Cliente actualizado 🔄");
      obtenerClientes();
    }

    // 🔹 DELETE
    async function eliminarCliente() {
      const id = document.getElementById("idEliminar").value;

      await fetch(`${BASE_URL}/clientes/${id}`, {
        method: "DELETE"
      });

      alert("Cliente eliminado ❌");
      obtenerClientes();
    }
  </script>

</body>
</html>
