<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header class="top-menu">
        <h1>nombre</h1>
        <nav>
            <a href="/index.html">Inicio</a>
            <a href="/pages/Area Medica/FormularioAreaMedica.html">Área Médica</a>
            <a href="AgregarProducto.html">Inventario</a>
            <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
        </nav>
    </header>

    <div class="container">

        <!-- MENÚ LATERAL -->
        <aside class="sidebar">
            <h3>Inventario</h3>
            <ul>
                <li><a href="AgregarProducto.html">Agregar Producto</a></li>
                <li><a href="ListadeProductos.html">Lista de Productos</a></li>
            </ul>
        </aside>

        <!-- FORMULARIO -->
        <form class="f2-area-medica" action="/guardar-producto" method="POST">

            <h2>Agregar Medicamento / Producto</h2>

            <label>Nombre del producto:</label>
            <input type="text" name="nombre" required>

            <label>Tipo:</label>
            <select name="tipo">
                <option>Medicamento</option>
                <option>Vacuna</option>
                <option>Accesorio</option>
                <option>Otro</option>
            </select>

            <label>Descripción:</label>
            <textarea name="descripcion"></textarea>

            <label>Precio:</label>
            <input type="number" name="precio" step="0.01" required>

            <label>Cantidad en stock:</label>
            <input type="number" name="stock" required>

            <label>Fecha de vencimiento:</label>
            <input type="date" name="vencimiento">

            <button type="submit">Guardar Producto</button>

        </form>

    </div>

</body>
</html>
