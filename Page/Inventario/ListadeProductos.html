<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultar Productos</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- 🔝 MENÚ SUPERIOR -->
<header class="top-menu">
    <h1>nombre</h1>
    <nav>
        <a href="/index.html">Inicio</a>
        <a href="/pages/Area Medica/FormularioAreaMedica.html">Área Médica</a>
        <a href="AgregarProducto.html">Inventario</a>
        <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
    </nav>
</header>

<div class="container">

    <!-- 📂 MENÚ LATERAL -->
    <aside class="sidebar">
        <h3>Inventario</h3>
        <ul>
            <li><a href="AgregarProducto.html">Agregar Producto</a></li>
            <li><a href="ListadeProductos.html">Lista de Productos</a></li>
        </ul>
    </aside>

    <!-- 📋 CONTENIDO PRINCIPAL -->
    <section class="f2-area-medica">
        <h2>Buscar Productos</h2>

        <!-- 🔍 Buscador -->
        <input type="text" id="buscador" placeholder="Buscar por nombre, tipo...">

        <!-- 📊 Tabla -->
        <table border="1" width="100%" cellspacing="0" cellpadding="8">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody id="tabla-productos">

                <tr>
                    <td>1</td>
                    <td>Amoxicilina</td>
                    <td>Medicamento</td>
                    <td>250</td>
                    <td>20</td>
                    <td>
                        <button onclick="eliminarProducto(1, this)">Eliminar</button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Vacuna Rabia</td>
                    <td>Vacuna</td>
                    <td>500</td>
                    <td>15</td>
                    <td>
                        <button onclick="eliminarProducto(2, this)">Eliminar</button>
                    </td>
                </tr>

            </tbody>
        </table>
    </section>

</div>

<!-- JS separado -->
<script src="buscador.js"></script>

</body>
</html>
