<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetSy — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-panel-left">
      <div class="login-brand">
        <span class="logo-icon">🐾</span>
        <h1>VetSy</h1>
        <p>Sistema de gestión para clínicas veterinarias</p>
      </div>
      <div class="login-features">
        <div class="login-feature-item"><span class="icon">🩺</span> Historial médico de mascotas</div>
        <div class="login-feature-item"><span class="icon">📦</span> Control de inventario</div>
        <div class="login-feature-item"><span class="icon">🧾</span> Facturación integrada</div>
        <div class="login-feature-item"><span class="icon">📊</span> Reportes y estadísticas</div>
      </div>
    </div>
    <div class="login-panel-right">
      <div class="login-form-header">
        <h2>Bienvenido</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
      </form>
      <div class="login-footer">VetSy &copy; 2025 — Gestión Veterinaria</div>
    </div>
  </div>
  <script src="Js/login.js"></script>
</body>
</html>
