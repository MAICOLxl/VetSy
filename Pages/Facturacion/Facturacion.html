<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facturación — VetSy</title>
    <link rel="stylesheet" href="../../css/app.css" />
    <script src="../../Js/themeSwitcher.js"></script>
    <script src="../../Js/themeEvents.js"></script>
  </head>
  <body>
    <script>
      const user = JSON.parse(
        sessionStorage.getItem("usuario") ||
          localStorage.getItem("usuario") ||
          "null",
      );
      // CORREGIDO: Ruta relativa al login
      if (!user) window.location.href = "../../login.html";
    </script>

    <header class="top-menu">
       <div class="logo-area" >
        <a href="../../index.html">
          <span id="logoArea">🐾 VetSy</span>
        </a>
      </div>
      <nav>
        <a href="../../index.html">Inicio</a>
        <a href="../Area Medica/Animales.html">Área Médica</a>
        <a href="../Inventario/AgregarProducto.html">Inventario</a>
        <a href="Facturacion.html" class="active">Facturación</a>
      </nav>
      <div class="header-controls">
        <button id="themeToggleBtn" class="theme-btn" title="Cambiar tema">
          🌙
        </button>
      </div>
      <div class="header-user" id="headerUser">
        <div class="avatar" id="headerAvatar">V</div>
        <span id="headerName">Usuario</span>
        <button id="logoutBtn">Cerrar sesión</button>
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Principal</h3>
        <ul>
          <li>
            <a href="../../index.html"><span class="nav-icon">🏠</span> Inicio</a>
          </li>
        </ul>
        <h3>Facturación</h3>
        <ul>
          <li>
            <a href="Facturacion.html" class="active"><span class="nav-icon">🧾</span> Nueva Factura</a>
          </li>
        </ul>
        <h3>Área Médica</h3>
        <ul>
          <li>
            <a href="../Area Medica/Clientes.html"><span class="nav-icon">👤</span> Clientes</a>
          </li>
          <li>
            <a href="../Area Medica/Animales.html"><span class="nav-icon">🐾</span> Animales</a>
          </li>
        </ul>
      </aside>

      <main class="contenido">
        <h1 class="page-title">Facturación</h1>
        <p class="page-subtitle">
          Genera facturas para las pruebas y servicios realizados
        </p>

        <section class="f-area-medica">
          <h2>Nueva Factura</h2>
          <form id="formFacturacion">
            <h3>Datos del Cliente</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Nombre del Dueño</label>
                <input type="text" id="dueno" placeholder="Ej: Juan Pérez" required />
              </div>
              <div class="form-group">
                <label>Nombre de la Mascota</label>
                <input type="text" id="mascota" placeholder="Ej: Max" required />
              </div>
            </div>
            
            <div class="form-group">
              <label>Tipo de Animal</label>
              <select id="tipo">
                <option>Perro</option>
                <option>Gato</option>
                <option>Otro</option>
              </select>
            </div>

            <h3 style="margin-top: 20px; color: var(--primary);">Pruebas Disponibles</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="hemograma" /> Hemograma</label>
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="perfil_bioquimico" /> Perfil Bioquímico</label>
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="rayosx" /> Rayos X</label>
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="ultrasonido" /> Ultrasonido</label>
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="parvovirus" /> Prueba de Parvovirus</label>
              <label style="display: flex; gap: 8px; cursor: pointer;"><input type="checkbox" name="moquillo" /> Prueba de Moquillo</label>
            </div>

            <button type="submit" class="btn-primary">Generar Factura</button>
          </form>
        </section>
      </main>
    </div>
    
    <script src="../../Js/facturacion.js"></script>
  </body>
</html>
