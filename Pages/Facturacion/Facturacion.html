<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facturación — VetSy</title>
    <link rel="stylesheet" href="../../css/app.css" />
    <script src="../../Js/themeSwitcher.js"></script>
    <script src="../../Js/themeEvents.js"></script>
  </head>
  <body>
    <script>
      const user = JSON.parse(sessionStorage.getItem("usuario") || localStorage.getItem("usuario") || "null");
      if (!user) window.location.href = "../../login.html";
    </script>

    <header class="top-menu">
       <div class="logo-area">
        <a href="../../index.html">
          <span id="logoArea">🐾 VetSy</span>
        </a>
      </div>
      <nav>
        <a href="../../index.html">Inicio</a>
        <a href="../Area Medica/Animales.html">Área Médica</a>
        <a href="../Inventario/AgregarProducto.html">Inventario</a>
        <a href="Facturacion.html" class="active">Facturación</a>
      </nav>
      <div class="header-controls">
        <button id="themeToggleBtn" class="theme-btn">🌙</button>
      </div>
      <div class="header-user" id="headerUser">
        <div class="avatar" id="headerAvatar">V</div>
        <span id="headerName">Usuario</span>
        <button id="logoutBtn">Cerrar sesión</button>
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Principal</h3>
        <ul>
          <li><a href="../../index.html"><span class="nav-icon">🏠</span> Inicio</a></li>
        </ul>
        <h3>Facturación</h3>
        <ul>
          <li><a href="Facturacion.html" class="active"><span class="nav-icon">🧾</span> Nueva Factura</a></li>
        </ul>
        <h3>Área Médica</h3>
        <ul>
          <li><a href="../Area Medica/Clientes.html"><span class="nav-icon">👤</span> Clientes</a></li>
          <li><a href="../Area Medica/Animales.html"><span class="nav-icon">🐾</span> Animales</a></li>
        </ul>
      </aside>

      <main class="contenido">
        <h1 class="page-title">Facturación</h1>
        <p class="page-subtitle">Genera facturas para las pruebas y servicios realizados</p>

        <div class="f-facturacion">
          <h2>Nueva Factura</h2>
          <form id="formFacturacion">
            <div class="sidebar-section">
                <h3 class="sidebar-label">Datos del Cliente</h3>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label>Nombre del Dueño</label>
                <input type="text" id="dueno" placeholder="Ej: Juan Pérez" required />
              </div>
              <div class="form-group">
                <label>Nombre de la Mascota</label>
                <input type="text" id="mascota" placeholder="Ej: Max" required />
              </div>
            </div>

            <div class="form-group">
              <label>Tipo de Animal</label>
              <select id="tipo">
                <option>Perro</option>
                <option>Gato</option>
                <option>Otro</option>
              </select>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-label">Pruebas Disponibles</h3>
            </div>

            <div class="form-grid">
              <div class="form-group-checkbox">
                <input type="checkbox" id="h" name="hemograma"> <label for="h">Hemograma</label>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="pb" name="perfil_bioquimico"> <label for="pb">Perfil Bioquímico</label>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="rx" name="rayosx"> <label for="rx">Rayos X</label>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="us" name="ultrasonido"> <label for="us">Ultrasonido</label>
              </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Generar Factura</button>
          </form>
        </div>
      </main>
    </div>
    <script src="../../Js/facturacion.js"></script>
  </body>
</html>
