<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/reset.css">
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "../../login.html";
</script>

<header class="top-menu">
    <h1>Veterinaria</h1>
    <nav>
        <a href="/index.html">Inicio</a>
        <a href="/pages/Area Medica/Animales.html">Área Médica</a>
        <a href="/pages/Inventario/AgregarProducto.html">Inventario</a>
        <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
    </nav>
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Menú</h3>
        <ul>
            <li><a href="Clientes.html">Registrar Clientes</a></li>
            <li><a href="/Pages/Area Medica/Animales.html">🐾 Registrar Animales</a></li>
            <li><a href="/Pages/Area Medica/Servicios.html">Registrar Servicios</a></li>
            <li><a href="../Area Medica/Historial .html">📊 Historial de Clientes</a></li>
        
        </ul>
    </aside>

    <main class="contenido">

        <h2>Registrar Cliente</h2>

        <form id="formCliente">
            <input type="text" id="nombre" placeholder="Nombre" required><br><br>
            <input type="text" id="telefono" placeholder="Teléfono" required><br><br>
            <input type="email" id="email" placeholder="Email"><br><br>
            <input type="text" id="direccion" placeholder="Dirección"><br><br>

            <button type="submit">Guardar Cliente</button>
        </form>

        <hr>

        <h2>Editar Cliente</h2>

        <!-- 🔎 BUSCADOR -->
        <input type="text"
               id="buscarEditar"
               placeholder="Buscar cliente..."
               oninput="buscarClienteEditar(this.value)"
               autocomplete="off">

        <div id="sugerenciasEditar" class="sugerencias"></div>

        <!-- 🟡 FORM EDITAR OCULTO -->
        <div id="panelEditar" style="display:none;">
            
            <br>

            <input type="hidden" id="idActualizar">

            <input type="text" id="nombreUpd" placeholder="Nombre"><br><br>
            <input type="text" id="telefonoUpd" placeholder="Teléfono"><br><br>
            <input type="email" id="emailUpd" placeholder="Email"><br><br>
            <input type="text" id="direccionUpd" placeholder="Dirección"><br><br>

            <button onclick="actualizarCliente()">Actualizar Cliente</button>
            <button onclick="cerrarEditar()" type="button">Cerrar</button>

        </div>

        <hr>

        <h2>Lista de Clientes</h2>

        <button onclick="obtenerClientes()">Actualizar lista</button>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaClientes"></tbody>
        </table>

    </main>

</div>

<script src="/Js/clientes.js"></script>

<script>
document.getElementById("formCliente").addEventListener("submit", async (e) => {
    e.preventDefault();
    await crearCliente();
    document.getElementById("formCliente").reset();
});
</script>

</body>
</html>
