<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/reset.css">
</head>

<body>

<!-- 🔐 Protección -->
<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "../../login.html";
</script>

<!-- 🔝 HEADER -->
<header class="top-menu">
    <h1>Veterinaria</h1>
    <nav>
        <a href="/index.html">Inicio</a>
        <a href="/pages/Area Medica/Animales.html">Área Médica</a>
        <a href="/pages/Inventario/AgregarProducto.html">Inventario</a>
        <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
    </nav>
</header>

<div class="container">

    <!-- 📂 MENÚ LATERAL -->
    <aside class="sidebar">
        <h3>Registrar Cliente</h3>
        <ul>
            <li><a href="Clientes.html">Registrar Clientes</a></li>
            <li><a href="/Pages/Area Medica/Animales.html">Registrar Animales</a></li>
            <li><a href="/Pages/Area Medica/Servicios.html">Registrar Servicios</a></li>
            <li><a href="#">Lista de Clientes</a></li>
        </ul>
    </aside>

    <!-- 📄 CONTENIDO -->
    <main class="contenido">

        <h2>Registrar Cliente</h2>

        <!-- 🔹 FORMULARIO CREAR -->
        <form id="formCliente">
            <input type="text" id="nombre" placeholder="Nombre" required><br><br>
            <input type="text" id="telefono" placeholder="Teléfono" required><br><br>
            <input type="email" id="email" placeholder="Email"><br><br>
            <input type="text" id="direccion" placeholder="Dirección"><br><br>
            <button type="submit">Guardar Cliente</button>
        </form>

        <hr>

        <h2>Lista de Clientes</h2>

        <button onclick="obtenerClientes()">Actualizar lista</button>

        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaClientes"></tbody>
        </table>

    </main>

</div>

<!-- 🔥 JS EXTERNO (IMPORTANTE) -->
<script src="/Js/clientes.js"></script>

<!-- 🔥 CONTROL DEL FORMULARIO -->
<script>
document.getElementById("formCliente").addEventListener("submit", async (e) => {
    e.preventDefault();

    await crearCliente();
    document.getElementById("formCliente").reset();
});
</script>

</body>
</html>
