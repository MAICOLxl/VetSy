<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animales</title>
</head>

<body>

<!-- 🔐 Protección -->
<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "../../login.html";
</script>

<h2>Registrar Animal</h2>

<form id="formAnimal">

  <input type="number" id="idCliente" placeholder="ID Cliente" required><br><br>

  <input type="text" id="nombre" placeholder="Nombre del animal" required><br><br>

  <input type="date" id="fechaNacimiento"><br><br>

  <input type="text" id="raza" placeholder="Raza"><br><br>

  <select id="genero" required>
    <option value="">Seleccione género</option>
    <option value="Macho">Macho</option>
    <option value="Hembra">Hembra</option>
  </select><br><br>

  <button type="submit">Guardar Animal</button>

</form>

<hr>

<h2>Lista de Animales</h2>

<table border="1">
<thead>
<tr>
  <th>ID</th>
  <th>Nombre</th>
  <th>Raza</th>
  <th>Género</th>
  <th>Dueño</th>
  <th>Acción</th>
</tr>
</thead>
<tbody id="tablaAnimales"></tbody>
</table>

<script src="/Js/animales.js"></script>

</body>
</html>
