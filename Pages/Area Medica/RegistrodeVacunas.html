<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Vacunas</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/reset.css">
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) window.location.href = "../../login.html";
</script>

<header class="top-menu">
    <h1>Veterinaria</h1>
    <nav>
        <a href="/index.html">Inicio</a>
        <a href="/pages/Area Medica/Animales.html">Área Médica</a>
        <a href="/pages/Inventario/AgregarProducto.html">Inventario</a>
        <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
    </nav>
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Registrar Vacunas</h3>
        <ul>
            <li><a href="/Pages/Area Medica/Clientes.html">Registrar Clientes</a></li>
            <li><a href="/Pages/Area Medica/Animales.html">🐾 Registrar Animales</a></li>
            <li><a href="../Area Medica/Servicios.html">Registrar Servicios</a></li>
            <li><a href="../Area Medica/RegistrodeVacunas.html">Registrar Vacunas</a></li>
            <li><a href="../Area Medica/AplicacióndeVacunas.html">Aplicar Vacunas</a></li>
            <li><a href="../Area Medica/Historial .html">📊 Historial de Clientes</a></li>
        </ul>
    </aside>

    <main class="contenido">

        <h2>Registro de Vacunas</h2>

        <!-- FORMULARIO -->
        <div class="form-box">
            <form id="formVacuna">
                <input type="hidden" id="idVacuna">

                <label>Nombre de la vacuna</label>
                <input type="text" id="nombre" required>

                <label>Descripción</label>
                <textarea id="descripcion" required></textarea>

                <button type="submit">Guardar</button>
            </form>
        </div>

        <!-- TABLA -->
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaVacunas"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="/Js/vacunas.js"></script>

</body>
</html>
