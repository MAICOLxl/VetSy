<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VetSy — Animales</title>
    <link rel="stylesheet" href="../../app.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-menu">
        <div class="logo-area"><span>🐾 VetSy</span></div>
        <nav>
            <a href="../../index.html">Inicio</a>
            <a href="Animales.html" class="active">Área Médica</a>
            <a href="../Inventario/AgregarProducto.html">Inventario</a>
            <a href="../Facturacion/Facturacion.html">Facturación</a>
        </nav>
        <div class="header-controls">
            <div class="header-user">
                <div class="avatar">A</div>
                <span>Admin</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Área Médica</h3>
            <ul>
                <li><a href="Clientes.html">👤 Clientes</a></li>
                <li><a href="Animales.html" class="active">🐾 Animales</a></li>
                <li><a href="Servicios.html">🩺 Servicios</a></li>
                <li><a href="RegistrodeVacunas.html">💉 Vacunas</a></li>
            </ul>
        </aside>

        <main class="contenido">
            <h1 class="page-title">Animales</h1>
            <p class="page-subtitle">Gestión de pacientes veterinarios</p>

            <section class="form-card">
                <h2>Registrar Animal</h2>
                <form id="formAnimal">
                    <div class="form-row">
                        <input type="number" id="idCliente" placeholder="ID Cliente" required>
                        <input type="text" id="nombre" placeholder="Nombre Mascota" required>
                    </div>
                    <div class="form-row">
                        <input type="text" id="raza" placeholder="Raza">
                        <select id="genero" required>
                            <option value="">Género</option>
                            <option value="Macho">Macho</option>
                            <option value="Hembra">Hembra</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Mascota</button>
                </form>
            </section>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Nombre</th><th>Raza</th><th>Dueño</th><th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAnimales"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../../Js/animales.js"></script>
</body>
</html>
