<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto — VetSy</title>
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header class="top-menu">
        <div class="logo-esquina">
            <img src="/assets/images/logo.png" alt="Logo VetSy">
        </div>
        <h1>VetSy</h1>
        <nav>
            <a href="/index.html">Inicio</a>
            <a href="/pages/Area Medica/FormularioAreaMedica.html">Área Médica</a>
            <a href="/pages/Inventario/AgregarProducto.html" class="active">Inventario</a>
            <a href="/pages/Facturacion/Facturacion.html">Facturación</a>
        </nav>
    </header>

    <div class="container">

        <aside class="sidebar">
            <h3>Inventario</h3>
            <ul>
                <li><a href="AgregarProducto.html" class="active">
                    <span class="nav-icon">➕</span> Agregar Producto
                </a></li>
                <li><a href="ListadeProductos.html">
                    <span class="nav-icon">📋</span> Lista de Productos
                </a></li>
            </ul>
        </aside>

        <main class="contenido">

            <h1 class="page-title">Agregar Producto</h1>
            <p class="page-subtitle">Registra un nuevo medicamento, vacuna o accesorio</p>

            <form class="f2-area-medica" id="formProducto" action="/guardar-producto" method="POST">

                <div class="form-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Amoxicilina 500mg" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" name="tipo">
                            <option>Medicamento</option>
                            <option>Vacuna</option>
                            <option>Accesorio</option>
                            <option>Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="vencimiento">Fecha de Vencimiento</label>
                        <input type="date" id="vencimiento" name="vencimiento">
                    </div>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="precio">Precio (RD$)</label>
                        <input type="number" id="precio" name="precio" step="0.01" placeholder="Ej: 250.00" required>
                    </div>
                    <div class="form-group">
                        <label for="stock">Cantidad en Stock</label>
                        <input type="number" id="stock" name="stock" placeholder="Ej: 50" required>
                    </div>
                </div>

                <button type="submit">Guardar Producto</button>

            </form>
        </main>
    </div>

</body>
</html>
