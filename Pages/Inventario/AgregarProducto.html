<div class="container">
  <aside class="sidebar">
    <h3>Inventario</h3>
    <ul>
      <li><a href="/Pages/Inventario/AgregarProducto.html"><span class="nav-icon">➕</span> Agregar Producto</a></li>
      <li><a href="/Pages/Inventario/AgregarMovimientos.html" class="active"><span class="nav-icon">🔄</span> Registrar Movimiento</a></li>

    <h3>Gestión</h3>
    <ul>
      <li><a href="/Pages/Area Medica/Clientes.html"><span class="nav-icon">🩺</span> Área Médica</a></li>

    </ul>

  <main class="contenido">
    <h1 class="page-title">Agregar Producto</h1>
    <p class="page-subtitle">Registra un nuevo medicamento, vacuna o accesorio</p>

    <!-- id="formProducto" sin action/method — lo maneja el JS -->
    <form class="f-area-medica" id="formProducto">
      <h2>Nuevo Producto</h2>

      <!-- nombre VARCHAR(50) -->
      <div class="form-group">
        <label for="nombre">Nombre del Producto</label>
        <input type="text" id="nombre" name="nombre"
               placeholder="Ej: Amoxicilina 500mg" maxlength="50" required>
      </div>

      <!-- descripcion VARCHAR(200) -->
      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion"
                  placeholder="Descripción del producto..." maxlength="200"></textarea>
      </div>

      <!-- categoria VARCHAR(50) -->
      <div class="form-group">
        <label for="categoria">Categoría</label>
        <select id="categoria" name="categoria" required>
          <option value="">-- Selecciona una categoría --</option>
          <option value="Medicamento">Medicamento</option>
          <option value="Vacuna">Vacuna</option>
          <option value="Accesorio">Accesorio</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <!-- precioCompra DECIMAL(10,2) | precioVenta DECIMAL(10,2) -->
      <div class="form-row">
        <div class="form-group">
          <label for="precioCompra">Precio de Compra (RD$)</label>
          <input type="number" id="precioCompra" name="precioCompra"
                 step="0.01" min="0" placeholder="Ej: 150.00" required>
        </div>
        <div class="form-group">
          <label for="precioVenta">Precio de Venta (RD$)</label>
          <input type="number" id="precioVenta" name="precioVenta"
                 step="0.01" min="0" placeholder="Ej: 250.00" required>
        </div>
      </div>

      <!-- stockActual INT | stockMinimo INT -->
      <div class="form-row">
        <div class="form-group">
          <label for="stockActual">Stock Actual</label>
          <input type="number" id="stockActual" name="stockActual"
                 min="0" placeholder="Ej: 50" required>
        </div>
        <div class="form-group">
          <label for="stockMinimo">Stock Mínimo</label>
          <input type="number" id="stockMinimo" name="stockMinimo"
                 min="0" placeholder="Ej: 10" required>
        </div>
      </div>

      <button type="submit" class="btn-primary">Guardar Producto</button>
    </form>
  </main>
</div>

<!-- Script del formulario -->
<script src="/js/Agregarproducto.js"></script>
</body>
</html>
